<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Configuração Criptografada</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f111a; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1a1d2d; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 500px; width: 100%; }
        h1 { margin-top: 0; color: #00e5ff; }
        p { color: #aaa; margin-bottom: 2rem; }
        .drop-zone { border: 2px dashed #00e5ff; border-radius: 8px; padding: 3rem 2rem; cursor: pointer; transition: all 0.3s ease; }
        .drop-zone.dragover { background: rgba(0, 229, 255, 0.1); border-color: #00ffaa; }
        .drop-zone:hover { background: rgba(0, 229, 255, 0.05); }
        .drop-zone p { color: #fff; margin: 0; font-size: 1.1rem; pointer-events: none; }
        .drop-zone i { font-size: 3rem; color: #00e5ff; margin-bottom: 1rem; pointer-events: none; display: block; }
        #file-input { display: none; }
        .success-msg { color: #00ffaa; margin-top: 1rem; font-weight: bold; }
        .error-msg { color: #ff4444; margin-top: 1rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Encriptador de JSON</h1>
        <p>Arraste seu arquivo .json para cá para transformá-lo em .enc e publicá-lo com segurança no GitHub.</p>
        
        <div class="drop-zone" id="drop-zone">
            <span style="font-size:3rem">📁</span>
            <p>Arraste o .json aqui ou clique para selecionar</p>
            <input type="file" id="file-input" accept=".json" multiple>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        // Chave secreta compartilhada com a extensão
        const SECRET_PASSPHRASE = "UniciveSecureConfig2026_!@#";

        // Cria uma chave de criptografia AES-GCM a partir da senha
        async function getKey() {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw", enc.encode(SECRET_PASSPHRASE), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]
            );
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode("unicive_salt"), iterations: 100000, hash: "SHA-256" },
                keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function encryptFile(file) {
            const statusEl = document.getElementById('status');
            try {
                const text = await file.text();
                // Valida se é JSON válido
                JSON.parse(text);

                const key = await getKey();
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const encodedData = new TextEncoder().encode(text);
                
                const encryptedData = await crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv }, key, encodedData
                );

                // Junta o IV e os dados criptografados
                const combined = new Uint8Array(iv.length + encryptedData.byteLength);
                combined.set(iv, 0);
                combined.set(new Uint8Array(encryptedData), iv.length);

                // Converte para Base64 para ficar fácil de hospedar no github pages
                const base64Str = btoa(String.fromCharCode.apply(null, combined));

                // Download
                const blob = new Blob([base64Str], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name.replace('.json', '.enc');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusEl.innerHTML = `<div class="success-msg">✅ ${file.name} criptografado com sucesso!</div>`;
                setTimeout(() => statusEl.innerHTML = '', 3000);
            } catch (err) {
                console.error(err);
                statusEl.innerHTML = `<div class="error-msg">❌ Erro ao criptografar ${file.name}. Verifique se é um JSON válido.</div>`;
            }
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                Array.from(e.dataTransfer.files).forEach(encryptFile);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                Array.from(e.target.files).forEach(encryptFile);
            }
            fileInput.value = '';
        });
    </script>
</body>
</html>
